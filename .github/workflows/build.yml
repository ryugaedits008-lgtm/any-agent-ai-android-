name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Extract ZIP
        run: unzip AnyAIAgent_v2_Polished.zip
      - name: Build APK
        run: |
          cd AnyAIAgent
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: AnyAIAgent/app/build/outputs/apk/debug/app-debug.apk
